<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>KidsZone</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700;800&family=Rubik:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ===== BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f0f4ff;
  --header-bg: rgba(255,255,255,0.88);
  --white: #ffffff;
  --shadow: 0 8px 32px rgba(80,80,160,0.13);
  --radius: 22px;
  --radius-sm: 12px;
  --tabbar-bg: rgba(255,255,255,0.92);
  /* Admin */
  --adm-bg: #12152a;
  --adm-surface: #1a1f3a;
  --adm-border: rgba(255,255,255,0.07);
  --adm-accent: #e94560;
  --adm-input: rgba(255,255,255,0.07);
  --adm-text: rgba(255,255,255,0.88);
  --adm-muted: rgba(255,255,255,0.38);
  /* App button palette */
  --c0:#ff6b6b; --c1:#ff8e53; --c2:#feca57; --c3:#48dbfb; --c4:#ff9ff3;
  --c5:#54a0ff; --c6:#5f27cd; --c7:#00d2d3; --c8:#1dd1a1; --c9:#ff6348;
  --c10:#2ed573; --c11:#e17055; --c12:#a29bfe; --c13:#fd79a8; --c14:#6c5ce7;
  --c15:#00b894; --c16:#fdcb6e; --c17:#0984e3; --c18:#b8e994; --c19:#d63031;
}

html, body { height: 100%; overflow: hidden; }

body {
  font-family: 'Rubik', 'Segoe UI', Tahoma, sans-serif;
  background: linear-gradient(160deg, #dff0ff 0%, #f0e8ff 45%, #ffe8f5 100%);
  display: flex;
  flex-direction: column;
  height: 100dvh;
}

/* ===== KIOSK BANNER ===== */
#kiosk-banner {
  display: none;
  background: linear-gradient(90deg,#e94560,#a018a0);
  color: #fff;
  text-align: center;
  font-size: 11px;
  font-weight: 600;
  padding: 4px 12px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 60;
  height: 26px;
  transition: transform 0.38s cubic-bezier(0.4,0,0.2,1), opacity 0.38s ease;
}

/* ===== HEADER ===== */
#app-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  background: var(--header-bg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  box-shadow: 0 2px 16px rgba(80,80,180,0.10);
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 50;
  height: 56px;
  transition: transform 0.38s cubic-bezier(0.4,0,0.2,1), opacity 0.38s ease;
}
/* When kiosk banner visible, push header down */
body.kiosk-on #app-header { top: 26px; }


#app-logo {
  font-family: 'Baloo 2', cursive;
  font-size: 21px;
  font-weight: 800;
  background: linear-gradient(135deg, #f7971e, #f94892);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
  letter-spacing: -0.3px;
}

.header-btn {
  background: none;
  border: none;
  font-size: 22px;
  cursor: pointer;
  padding: 8px;
  border-radius: 50%;
  transition: background 0.18s;
  line-height: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}
.header-btn:hover, .header-btn:active { background: rgba(0,0,0,0.07); }

#admin-btn { opacity: 0.4; transition: opacity 0.2s, background 0.18s; }
#admin-btn:hover { opacity: 0.9; }

/* ===== MAIN AREA ===== */
#main-area {
  position: fixed;
  top: 56px;
  bottom: 0;
  left: 0; right: 0;
  overflow: hidden;
  transition: top 0.38s cubic-bezier(0.4,0,0.2,1),
              bottom 0.38s cubic-bezier(0.4,0,0.2,1);
}
/* Push down when kiosk banner active */
body.kiosk-on #main-area { top: 82px; }
/* Shrink when tab-bar visible */
body.has-tabs #main-area { bottom: 54px; }
/* Full-screen when chrome hidden */
body.chrome-hidden #main-area { top: 0 !important; bottom: 0 !important; }

/* ===== HOME SCREEN ===== */
#home-screen {
  position: absolute;
  inset: 0;
  overflow-y: auto;
  padding: 20px 14px 24px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(95px, 1fr));
  gap: 14px;
  align-content: start;
}

.app-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 18px 10px;
  border-radius: 26px;
  border: none;
  cursor: pointer;
  font-family: 'Rubik', sans-serif;
  font-weight: 600;
  font-size: 12.5px;
  color: #fff;
  transition: transform 0.15s, box-shadow 0.15s;
  box-shadow: 0 6px 20px rgba(0,0,0,0.18);
  text-shadow: 0 1px 4px rgba(0,0,0,0.25);
  min-height: 105px;
  word-break: break-word;
  text-align: center;
  line-height: 1.35;
  position: relative;
  animation: popIn 0.32s cubic-bezier(0.34,1.56,0.64,1) both;
}
.app-btn:active { transform: scale(0.93); box-shadow: 0 3px 10px rgba(0,0,0,0.18); }
.app-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(0,0,0,0.22); }

.app-icon { font-size: 38px; line-height: 1; display: block; }

.open-dot {
  position: absolute;
  top: 9px;
  right: 9px;
  width: 9px; height: 9px;
  background: #2ecc71;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.9);
  box-shadow: 0 0 6px rgba(46,204,113,0.7);
}

.pin-badge {
  position: absolute;
  top: 8px;
  left: 8px;
  font-size: 11px;
  line-height: 1;
}

@keyframes popIn {
  from { opacity: 0; transform: scale(0.7); }
  to { opacity: 1; transform: scale(1); }
}

.empty-home {
  grid-column: 1/-1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  padding: 60px 20px;
  color: #9b8ec4;
  text-align: center;
}
.empty-home .big-emoji { font-size: 72px; }
.empty-home p { font-size: 15px; line-height: 1.7; }

/* ===== IFRAME CONTAINER ===== */
#iframe-container {
  position: absolute;
  inset: 0;
  display: none;
}

.app-iframe {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: none;
  display: none;
  background: #fff;
}

/* ===== TAB BAR ===== */
#tab-bar {
  display: none;
  align-items: center;
  gap: 8px;
  padding: 7px 10px;
  background: var(--tabbar-bg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  box-shadow: 0 -2px 16px rgba(80,80,180,0.10);
  overflow-x: auto;
  overflow-y: hidden;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 54px;
  z-index: 50;
  scrollbar-width: none;
  transition: transform 0.38s cubic-bezier(0.4,0,0.2,1), opacity 0.38s ease;
}
#tab-bar::-webkit-scrollbar { display: none; }

.tab-item {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 7px 12px 7px 10px;
  border-radius: 18px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  white-space: nowrap;
  transition: all 0.18s;
  flex-shrink: 0;
  color: #6b7cb5;
  background: rgba(100,120,200,0.09);
  border: 2px solid transparent;
  user-select: none;
}
.tab-item:hover { background: rgba(100,120,200,0.16); }
.tab-item.active { color: #fff; border-color: transparent; }

.tab-icon { font-size: 16px; }
.tab-name { max-width: 100px; overflow: hidden; text-overflow: ellipsis; }

.tab-close {
  width: 18px; height: 18px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
  border-radius: 50%;
  opacity: 0.7;
  transition: background 0.15s, opacity 0.15s;
  margin-right: -2px;
}
.tab-close:hover { background: rgba(0,0,0,0.15); opacity: 1; }

.tab-pin { font-size: 10px; opacity: 0.75; }

/* ===== ADMIN OVERLAY ===== */
#admin-overlay {
  position: fixed;
  inset: 0;
  background: rgba(5,5,20,0.65);
  backdrop-filter: blur(5px);
  -webkit-backdrop-filter: blur(5px);
  z-index: 1000;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
#admin-overlay.open { display: flex; }

/* ===== PASSWORD SCREEN ===== */
#pw-screen {
  background: var(--adm-bg);
  border-radius: 28px;
  padding: 44px 36px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 18px;
  width: min(380px, 100%);
  box-shadow: 0 30px 80px rgba(0,0,0,0.5);
}

#pw-screen .lock-icon { font-size: 56px; }
#pw-screen h2 {
  font-size: 22px;
  font-weight: 700;
  color: var(--adm-text);
}
#pw-screen p { font-size: 13px; color: var(--adm-muted); }

#pw-input {
  background: var(--adm-input);
  border: 2px solid rgba(255,255,255,0.12);
  border-radius: 14px;
  padding: 14px 20px;
  color: #fff;
  font-size: 28px;
  letter-spacing: 10px;
  text-align: center;
  font-family: monospace;
  outline: none;
  width: 100%;
  transition: border-color 0.2s;
}
#pw-input:focus { border-color: var(--adm-accent); }

#pw-error { font-size: 13px; color: var(--adm-accent); min-height: 18px; font-weight: 500; }

.pw-btns { display: flex; gap: 10px; width: 100%; }

/* ===== ADMIN PANEL ===== */
#admin-panel {
  background: var(--adm-bg);
  border-radius: 24px;
  width: min(740px, 100%);
  height: min(88vh, 720px);
  display: none;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 30px 80px rgba(0,0,0,0.5);
}
#admin-panel.open { display: flex; }

#adm-header {
  background: var(--adm-surface);
  padding: 18px 22px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--adm-border);
  flex-shrink: 0;
}
#adm-header h2 {
  font-size: 17px;
  font-weight: 700;
  color: var(--adm-accent);
  display: flex;
  align-items: center;
  gap: 8px;
}
#adm-close {
  background: none;
  border: none;
  color: var(--adm-muted);
  font-size: 22px;
  cursor: pointer;
  padding: 6px 10px;
  border-radius: 8px;
  transition: all 0.15s;
  line-height: 1;
}
#adm-close:hover { color: #fff; background: rgba(255,255,255,0.1); }

/* Admin tab navigation */
#adm-tabs {
  display: flex;
  background: var(--adm-surface);
  border-bottom: 1px solid var(--adm-border);
  flex-shrink: 0;
  overflow-x: auto;
  scrollbar-width: none;
}
#adm-tabs::-webkit-scrollbar { display: none; }

.adm-tab {
  padding: 11px 18px;
  font-size: 13px;
  font-weight: 600;
  color: var(--adm-muted);
  cursor: pointer;
  border-bottom: 2.5px solid transparent;
  transition: all 0.18s;
  white-space: nowrap;
  flex-shrink: 0;
}
.adm-tab:hover { color: var(--adm-text); }
.adm-tab.active { color: var(--adm-accent); border-bottom-color: var(--adm-accent); }

/* Admin content */
#adm-content {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.15) transparent;
}

/* ===== ADMIN COMPONENTS ===== */
.adm-section-title {
  font-size: 11px;
  font-weight: 700;
  color: var(--adm-muted);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 14px;
}

.adm-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 15px 0;
  border-bottom: 1px solid var(--adm-border);
  gap: 16px;
}
.adm-row:last-child { border-bottom: none; }
.adm-row-label { font-size: 14.5px; color: var(--adm-text); font-weight: 500; }
.adm-row-desc { font-size: 12px; color: var(--adm-muted); margin-top: 3px; }

.adm-input {
  background: var(--adm-input);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 10px;
  padding: 9px 13px;
  color: #fff;
  font-size: 13.5px;
  font-family: 'Rubik', sans-serif;
  outline: none;
  transition: border-color 0.18s;
  width: 100%;
}
.adm-input:focus { border-color: var(--adm-accent); }
.adm-input::placeholder { color: var(--adm-muted); }

.adm-btn {
  background: var(--adm-accent);
  border: none;
  border-radius: 10px;
  padding: 10px 20px;
  color: #fff;
  font-size: 13.5px;
  font-weight: 600;
  cursor: pointer;
  font-family: 'Rubik', sans-serif;
  transition: opacity 0.18s, transform 0.12s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}
.adm-btn:hover { opacity: 0.88; }
.adm-btn:active { transform: scale(0.97); }
.adm-btn.ghost {
  background: rgba(255,255,255,0.08);
  color: var(--adm-text);
  border: 1px solid var(--adm-border);
}
.adm-btn.danger { background: rgba(233,69,96,0.18); color: #e94560; border: 1px solid rgba(233,69,96,0.35); }

/* Toggle */
.toggle-wrap {
  display: flex;
  align-items: center;
  gap: 9px;
  cursor: pointer;
  font-size: 13px;
  color: var(--adm-muted);
  flex-shrink: 0;
}
.toggle {
  position: relative;
  width: 42px;
  height: 24px;
  flex-shrink: 0;
}
.toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
.toggle-knob {
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0.18);
  border-radius: 24px;
  transition: background 0.2s;
  cursor: pointer;
}
.toggle-knob::before {
  content: '';
  position: absolute;
  width: 18px; height: 18px;
  right: 3px; top: 3px;
  background: #fff;
  border-radius: 50%;
  transition: right 0.2s;
  box-shadow: 0 1px 4px rgba(0,0,0,0.2);
}
.toggle input:checked ~ .toggle-knob { background: var(--adm-accent); }
.toggle input:checked ~ .toggle-knob::before { right: 21px; }

/* Number control */
.num-ctrl { display: flex; align-items: center; gap: 12px; }
.num-btn {
  width: 33px; height: 33px;
  border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.18);
  background: none;
  color: #fff;
  font-size: 20px;
  cursor: pointer;
  transition: background 0.15s;
  display: flex; align-items: center; justify-content: center;
  line-height: 1;
}
.num-btn:hover { background: rgba(255,255,255,0.12); }
.num-val { font-size: 22px; font-weight: 700; color: var(--adm-text); min-width: 28px; text-align: center; }

/* Slot cards */
.slot-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--adm-border);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 10px;
  transition: border-color 0.18s;
}
.slot-card:hover { border-color: rgba(255,255,255,0.14); }

.slot-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 13px;
}
.slot-num {
  font-size: 12px;
  font-weight: 700;
  color: var(--adm-accent);
  background: rgba(233,69,96,0.14);
  width: 30px; height: 30px;
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.slot-name-preview {
  font-size: 14px;
  font-weight: 600;
  color: var(--adm-text);
  flex: 1;
}

/* Color row */
.color-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 10px;
}
.cdot {
  width: 24px; height: 24px;
  border-radius: 50%;
  cursor: pointer;
  border: 2.5px solid transparent;
  transition: transform 0.13s, border-color 0.13s;
  flex-shrink: 0;
}
.cdot:hover { transform: scale(1.2); }
.cdot.sel { border-color: #fff; transform: scale(1.22); }

/* Field grid */
.field-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.field-label { font-size: 11px; color: var(--adm-muted); margin-bottom: 4px; font-weight: 500; }

/* Source toggle */
.src-toggle {
  display: flex;
  background: rgba(255,255,255,0.05);
  border-radius: 8px;
  padding: 3px;
  gap: 3px;
  margin-bottom: 8px;
}
.src-btn {
  flex: 1;
  padding: 7px 8px;
  border: none;
  background: none;
  color: var(--adm-muted);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  border-radius: 6px;
  transition: all 0.15s;
  font-family: 'Rubik', sans-serif;
}
.src-btn.active { background: var(--adm-accent); color: #fff; }

/* File upload */
.file-drop {
  background: var(--adm-input);
  border: 1.5px dashed rgba(255,255,255,0.18);
  border-radius: 10px;
  padding: 11px 14px;
  color: var(--adm-muted);
  font-size: 12.5px;
  cursor: pointer;
  text-align: center;
  transition: all 0.18s;
  width: 100%;
}
.file-drop:hover { border-color: rgba(255,255,255,0.35); color: var(--adm-text); }
.file-drop.loaded { border-color: rgba(29,209,161,0.5); color: #1dd1a1; }

/* Slot options row */
.slot-opts { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-top: 10px; }

/* Password fields */
.pw-fields { display: flex; flex-direction: column; gap: 14px; max-width: 340px; margin: 0 auto; }
.pw-msg { font-size: 13px; min-height: 20px; text-align: center; font-weight: 500; }

/* iframe loading overlay */
.iframe-wrap {
  position: absolute;
  inset: 0;
  display: none;
}
.iframe-wrap.active { display: block; }

.iframe-loading {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  background: #f0f4ff;
  z-index: 2;
  font-family: 'Rubik', sans-serif;
  color: #7b8cc4;
  font-size: 15px;
  transition: opacity 0.3s;
}
.iframe-loading .spin {
  width: 44px; height: 44px;
  border: 4px solid rgba(120,140,220,0.2);
  border-top-color: #6c5ce7;
  border-radius: 50%;
  animation: spin 0.9s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.iframe-error {
  position: absolute;
  inset: 0;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  background: #fff8f0;
  z-index: 3;
  font-family: 'Rubik', sans-serif;
  text-align: center;
  padding: 30px;
}
.iframe-error .err-icon { font-size: 56px; }
.iframe-error h3 { font-size: 17px; color: #e17055; font-weight: 700; }
.iframe-error p { font-size: 13px; color: #888; line-height: 1.7; max-width: 320px; }
.err-open-btn {
  background: #6c5ce7;
  color: #fff;
  border: none;
  border-radius: 12px;
  padding: 11px 22px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  font-family: 'Rubik', sans-serif;
  transition: opacity 0.18s;
}
.err-open-btn:hover { opacity: 0.85; }

/* ===== AUTO-HIDE CHROME ===== */
body.chrome-hidden #app-header {
  transform: translateY(-110%);
  opacity: 0;
  pointer-events: none;
}
body.chrome-hidden #kiosk-banner {
  transform: translateY(-110%);
  opacity: 0;
  pointer-events: none;
}
body.chrome-hidden #tab-bar {
  transform: translateY(110%);
  opacity: 0;
  pointer-events: none;
}

/* ===== PINCH-TO-ZOOM ===== */
.iframe-wrap {
  transform-origin: center center;
  touch-action: none; /* we handle gestures manually */
  overflow: hidden;
}
/* zoom indicator pill */
.zoom-badge {
  position: absolute;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.55);
  color: #fff;
  font-size: 13px;
  font-weight: 700;
  padding: 5px 16px;
  border-radius: 20px;
  z-index: 10;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s;
  white-space: nowrap;
}
.zoom-badge.show { opacity: 1; }


/* Tap-zone overlay shown when chrome is hidden */
#tap-zone {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 56px;
  z-index: 200;
  display: none;
  align-items: flex-end;
  justify-content: center;
  padding-bottom: 8px;
  pointer-events: auto;
}
body.chrome-hidden #tap-zone { display: flex; }

.tap-hint {
  background: rgba(0,0,0,0.28);
  color: rgba(255,255,255,0.55);
  font-size: 11px;
  padding: 5px 14px;
  border-radius: 20px;
  pointer-events: none;
  transition: opacity 0.3s;
}

/* Chrome-show flash bar (tap feedback) */
#tap-flash {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg,#e94560,#6c5ce7);
  z-index: 300;
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.25s ease;
}

/* ===== ICON UPLOAD ===== */
.icon-pick-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
}
.icon-preview-box {
  width: 50px; height: 50px;
  border-radius: 12px;
  background: rgba(255,255,255,0.07);
  border: 1.5px solid rgba(255,255,255,0.14);
  display: flex; align-items: center; justify-content: center;
  font-size: 26px;
  flex-shrink: 0;
  overflow: hidden;
  cursor: pointer;
  transition: border-color 0.18s;
}
.icon-preview-box:hover { border-color: var(--adm-accent); }
.icon-preview-box img { width: 100%; height: 100%; object-fit: cover; }

.icon-pick-btns { display: flex; flex-direction: column; gap: 5px; flex: 1; }
.icon-pick-btn {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 8px;
  padding: 6px 10px;
  color: var(--adm-muted);
  font-size: 11.5px;
  font-weight: 600;
  cursor: pointer;
  font-family: 'Rubik', sans-serif;
  transition: all 0.15s;
  text-align: right;
}
.icon-pick-btn:hover { background: rgba(255,255,255,0.12); color: var(--adm-text); }

/* App button image icon */
.app-icon img { width: 42px; height: 42px; object-fit: cover; border-radius: 10px; }

/* Toast */
.toast {
  position: fixed;
  bottom: 72px;
  left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: #1a1f3a;
  color: #fff;
  padding: 12px 24px;
  border-radius: 24px;
  font-size: 13.5px;
  font-weight: 600;
  z-index: 9999;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s, transform 0.25s;
  box-shadow: 0 6px 24px rgba(0,0,0,0.35);
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(120,120,200,0.2); border-radius: 4px; }
</style>
</head>
<body>

<!-- Kiosk indicator -->
<div id="kiosk-banner">🔒 מצב קיוסק פעיל — לחץ 5 פעמים על שם האפליקציה לניהול</div>

<!-- Header -->
<header id="app-header">
  <button class="header-btn" id="home-btn" title="בית">🏠</button>
  <div id="app-logo">KidsZone ⭐</div>

</header>

<!-- Main content -->
<div id="main-area">
  <div id="home-screen"></div>
  <div id="iframe-container"></div>
</div>

<!-- Tab bar -->
<div id="tab-bar"></div>

<!-- Admin overlay -->
<div id="admin-overlay">

  <!-- Password screen -->
  <div id="pw-screen">
    <div class="lock-icon">🔐</div>
    <h2>ממשק ניהול</h2>
    <p>הכנס סיסמת מנהל להמשך</p>
    <input type="password" id="pw-input" placeholder="••••" maxlength="30" autocomplete="off">

  </div>

  <!-- Admin panel -->
  <div id="admin-panel">
    <div id="adm-header">
      <h2>🛡️ ממשק ניהול KidsZone</h2>
      <button id="adm-close" onclick="closeAdmin()">✕</button>
    </div>
    <div id="adm-tabs">
      <div class="adm-tab active" data-tab="apps" onclick="switchTab(this,'apps')">📱 אפליקציות</div>
      <div class="adm-tab" data-tab="settings" onclick="switchTab(this,'settings')">⚙️ הגדרות</div>
      <div class="adm-tab" data-tab="security" onclick="switchTab(this,'security')">🔑 אבטחה</div>
    </div>
    <div id="adm-content"></div>
  </div>

</div>

<!-- Tap zone for restoring chrome -->
<div id="tap-zone"><div class="tap-hint">• • • • •</div></div>
<div id="tap-flash"></div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   CONSTANTS
   ============================================================ */
const COLORS = [
  '#ff6b6b','#ff8e53','#feca57','#48dbfb','#ff9ff3',
  '#54a0ff','#5f27cd','#00d2d3','#1dd1a1','#ff6348',
  '#2ed573','#e17055','#a29bfe','#fd79a8','#6c5ce7',
  '#00b894','#fdcb6e','#0984e3','#b8e994','#d63031'
];
const ICONS = ['🎮','📚','🎨','🎵','🌍','⭐','🎯','🦁','🌈','🚀',
               '🎪','🧩','🎭','🏆','🦋','🌟','🎠','🎲','🌺','🎈'];

/* ============================================================
   STATE & CONFIG
   ============================================================ */
function makeDefaultSlot(i) {
  return { name:'', url:'', fileData:null, srcType:'url',
           enabled:false, pinned:false, color:COLORS[i], icon:ICONS[i],
           iconType:'emoji', iconData:null };
}

function defaultCfg() {
  return {
    password: '1234',
    appName: 'KidsZone ⭐',
    kioskMode: false,
    maxOpen: 3,
    slots: Array.from({length:20}, (_,i) => makeDefaultSlot(i))
  };
}

let cfg = (()=>{
  try { const s=localStorage.getItem('kz_v2'); if(s) return JSON.parse(s); }
  catch(e){}
  return defaultCfg();
})();

function saveCfg() {
  try { localStorage.setItem('kz_v2', JSON.stringify(cfg)); }
  catch(e) { showToast('⚠️ שגיאה בשמירה — ייתכן שהנפח מלא'); }
}

// Runtime state
let openTabs = [];    // slot indices that are open
let activeIdx = null; // currently visible
let adminAuth = false;
let curAdmTab = 'apps';
let logoTaps = 0, logoTimer = null;

/* ============================================================
   HOME SCREEN
   ============================================================ */
function renderHome() {
  const home = document.getElementById('home-screen');
  const active = cfg.slots.filter(s => s.enabled && s.name);
  if (active.length === 0) {
    home.innerHTML = `<div class="empty-home">
      <div class="big-emoji">🌟</div>
      <p>אין אפליקציות פעילות עדיין.<br>
      פנה למנהל להוסיף אפליקציות.</p>
    </div>`;
    return;
  }
  home.innerHTML = '';
  let delay = 0;
  cfg.slots.forEach((s, i) => {
    if (!s.enabled || !s.name) return;
    const isOpen = openTabs.includes(i);
    const btn = document.createElement('button');
    btn.className = 'app-btn';
    btn.style.cssText = `
      background: linear-gradient(145deg, ${s.color}dd, ${s.color});
      animation-delay: ${delay * 45}ms;
    `;
    btn.innerHTML = `
      ${isOpen ? '<span class="open-dot"></span>' : ''}
      ${s.pinned ? '<span class="pin-badge">📌</span>' : ''}
      <span class="app-icon">${s.iconType==='image' && s.iconData
        ? `<img src="${s.iconData}" alt="">`
        : s.icon}</span>
      ${esc(s.name)}
    `;
    btn.onclick = () => openApp(i);
    home.appendChild(btn);
    delay++;
  });
}

/* ============================================================
   TAB / IFRAME MANAGEMENT
   ============================================================ */
function openApp(idx) {
  if (openTabs.includes(idx)) { activateTab(idx); return; }

  // Need to evict if at limit
  if (openTabs.length >= cfg.maxOpen) {
    const victim = openTabs.find(i => !cfg.slots[i].pinned);
    if (victim === undefined) {
      showToast('⚠️ כל האפליקציות הפתוחות נעולות — לא ניתן לפתוח עוד');
      return;
    }
    evictIframe(victim);
  }

  openTabs.push(idx);
  buildIframe(idx);
  activateTab(idx);
  renderHome();
  renderTabBar();
}

function buildIframe(idx) {
  const s = cfg.slots[idx];
  const src = s.srcType === 'file' ? s.fileData : s.url;

  // Wrapper div
  const wrap = document.createElement('div');
  wrap.className = 'iframe-wrap';
  wrap.id = `fw${idx}`;

  // Loading overlay
  const loading = document.createElement('div');
  loading.className = 'iframe-loading';
  loading.id = `fl${idx}`;
  loading.innerHTML = `<div class="spin"></div><div>טוען את <strong>${esc(s.name)}</strong>…</div>`;
  wrap.appendChild(loading);

  // Error overlay
  const errDiv = document.createElement('div');
  errDiv.className = 'iframe-error';
  errDiv.id = `fe${idx}`;
  const safeUrl = esc(src || '');
  const safeName = esc(s.url || s.name || '');
  errDiv.innerHTML = `
    <div class="err-icon">🚫</div>
    <h3>לא ניתן להציג את הדף</h3>
    <p>${src
      ? `האתר <strong>${safeName}</strong> חוסם טעינה בתוך מסגרת.<br>זו הגבלת האתר עצמו, לא תקלה באפליקציה.`
      : 'לא הוגדרה כתובת או קובץ עבור אפליקציה זו.<br>עדכן בממשק הניהול.'
    }</p>
    ${src ? `<button class="err-open-btn" onclick="window.open('${safeUrl}','_blank')">🔗 פתח בלשונית חדשה</button>` : ''}
  `;
  wrap.appendChild(errDiv);

  if (!src) {
    // No content configured
    loading.style.display = 'none';
    errDiv.style.display = 'flex';
  } else {
    const fr = document.createElement('iframe');
    fr.id = `fr${idx}`;
    fr.className = 'app-iframe';
    fr.style.display = 'block';
    fr.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-forms allow-popups allow-downloads');

    let loadTimer = setTimeout(() => showIframeError(idx), 15000);

    fr.onload = () => {
      clearTimeout(loadTimer);
      try {
        const doc = fr.contentDocument || fr.contentWindow?.document;
        // Accessible doc with content → success
        if (doc && doc.body && doc.body.innerHTML.length > 5) {
          loading.style.display = 'none';
          return;
        }
        // Blank document → likely blocked
        showIframeError(idx);
      } catch(e) {
        // Cross-origin — can't read, assume it loaded OK
        loading.style.display = 'none';
      }
    };
    fr.onerror = () => { clearTimeout(loadTimer); showIframeError(idx); };

    fr.src = src;
    wrap.appendChild(fr);
  }

  document.getElementById('iframe-container').appendChild(wrap);
}

function showIframeError(idx) {
  const loading = document.getElementById(`fl${idx}`);
  const err     = document.getElementById(`fe${idx}`);
  if (loading) loading.style.display = 'none';
  if (err)     err.style.display = 'flex';
}

function activateTab(idx) {
  activeIdx = idx;
  // Hide all wrappers
  openTabs.forEach(i => {
    const w = document.getElementById(`fw${i}`);
    if (w) w.classList.remove('active');
  });
  // Show active
  const aw = document.getElementById(`fw${idx}`);
  if (aw) aw.classList.add('active');

  document.getElementById('home-screen').style.display = 'none';
  document.getElementById('iframe-container').style.display = 'block';
  renderTabBar();
  startChromeHideTimer();
}

// ===== CHROME AUTO-HIDE =====
let chromeHideTimer = null;
let tapCount = 0, tapResetTimer = null;

function startChromeHideTimer() {
  revealChrome();
  clearTimeout(chromeHideTimer);
  chromeHideTimer = setTimeout(hideChrome, 10000);
}

function hideChrome() {
  document.body.classList.add('chrome-hidden');
}

function revealChrome() {
  document.body.classList.remove('chrome-hidden');
  clearTimeout(chromeHideTimer);
  // Restart 10s countdown if we're in an app
  if (activeIdx !== null) {
    chromeHideTimer = setTimeout(hideChrome, 10000);
  }
}

function stopChromeHide() {
  clearTimeout(chromeHideTimer);
  document.body.classList.remove('chrome-hidden');
}

// Tap zone logic
document.getElementById('tap-zone').addEventListener('click', () => {
  tapCount++;
  const fl = document.getElementById('tap-flash');
  fl.style.transform = `scaleX(${tapCount/5})`;
  clearTimeout(tapResetTimer);
  tapResetTimer = setTimeout(() => {
    tapCount = 0;
    fl.style.transform = 'scaleX(0)';
  }, 1500);
  if (tapCount >= 5) {
    tapCount = 0;
    fl.style.transform = 'scaleX(0)';
    revealChrome();
  }
});

/* ============================================================
   PINCH-TO-ZOOM
   ============================================================ */
const zoomState = {}; // per-slot zoom scale
let zoomBadgeTimer = null;

function getZoom(idx) { return zoomState[idx] || 1; }

function applyZoom(idx, newScale) {
  newScale = Math.max(0.3, Math.min(2.5, newScale));
  zoomState[idx] = newScale;
  const wrap = document.getElementById(`fw${idx}`);
  if (!wrap) return;
  wrap.style.transform = newScale === 1 ? '' : `scale(${newScale})`;
  wrap.style.transformOrigin = 'center top';
  // If scaled down, center horizontally
  if (newScale < 1) {
    wrap.style.width = `${100 / newScale}%`;
    wrap.style.left = `${(1 - 1/newScale) * 50}%`;
  } else {
    wrap.style.width = '';
    wrap.style.left = '';
  }
  showZoomBadge(idx, newScale);
}

function showZoomBadge(idx, scale) {
  let badge = document.getElementById(`zb${idx}`);
  if (!badge) {
    badge = document.createElement('div');
    badge.className = 'zoom-badge';
    badge.id = `zb${idx}`;
    const wrap = document.getElementById(`fw${idx}`);
    if (wrap) wrap.appendChild(badge);
  }
  badge.textContent = `🔍 ${Math.round(scale * 100)}%`;
  badge.classList.add('show');
  clearTimeout(zoomBadgeTimer);
  zoomBadgeTimer = setTimeout(() => badge.classList.remove('show'), 1800);
}

function resetZoom(idx) {
  zoomState[idx] = 1;
  const wrap = document.getElementById(`fw${idx}`);
  if (wrap) {
    wrap.style.transform = '';
    wrap.style.width = '';
    wrap.style.left = '';
  }
}

// Attach pinch listeners to iframe-container
(function setupPinch() {
  const container = document.getElementById('iframe-container');
  let startDist = 0;
  let startScale = 1;
  let pinching = false;

  function getTouchDist(e) {
    const t = e.touches;
    const dx = t[0].clientX - t[1].clientX;
    const dy = t[0].clientY - t[1].clientY;
    return Math.hypot(dx, dy);
  }

  container.addEventListener('touchstart', e => {
    if (e.touches.length === 2) {
      pinching = true;
      startDist = getTouchDist(e);
      startScale = getZoom(activeIdx);
      e.preventDefault();
    }
  }, { passive: false });

  container.addEventListener('touchmove', e => {
    if (pinching && e.touches.length === 2 && activeIdx !== null) {
      const dist = getTouchDist(e);
      const ratio = dist / startDist;
      applyZoom(activeIdx, startScale * ratio);
      e.preventDefault();
    }
  }, { passive: false });

  container.addEventListener('touchend', e => {
    if (e.touches.length < 2) pinching = false;
  });

  // Double-tap to reset zoom
  let lastTap = 0;
  container.addEventListener('touchend', e => {
    if (e.touches.length === 0 && activeIdx !== null) {
      const now = Date.now();
      if (now - lastTap < 300) {
        resetZoom(activeIdx);
        showZoomBadge(activeIdx, 1);
      }
      lastTap = now;
    }
  });
})();


function evictIframe(idx) {
  const w = document.getElementById(`fw${idx}`);
  if (w) w.remove();
  openTabs = openTabs.filter(i => i !== idx);
  delete zoomState[idx];
}

function closeTab(idx, evt) {
  if (evt) { evt.stopPropagation(); evt.preventDefault(); }
  if (cfg.slots[idx].pinned) return;
  evictIframe(idx);

  if (activeIdx === idx) {
    if (openTabs.length > 0) {
      activateTab(openTabs[openTabs.length - 1]);
    } else {
      activeIdx = null;
      showHomeScreen();
    }
  }
  renderTabBar();
  renderHome();
}

function showHomeScreen() {
  document.getElementById('home-screen').style.display = 'grid';
  document.getElementById('iframe-container').style.display = 'none';
  activeIdx = null;
  stopChromeHide();
  renderTabBar();
}

function renderTabBar() {
  const bar = document.getElementById('tab-bar');
  if (openTabs.length === 0) {
    bar.style.display = 'none';
    document.body.classList.remove('has-tabs');
    return;
  }
  bar.style.display = 'flex';
  document.body.classList.add('has-tabs');
  bar.innerHTML = openTabs.map(i => {
    const s = cfg.slots[i];
    const isAct = i === activeIdx;
    const iconHtml = s.iconType==='image' && s.iconData
      ? `<img src="${s.iconData}" style="width:18px;height:18px;border-radius:5px;object-fit:cover;" alt="">`
      : s.icon;
    return `<div class="tab-item${isAct?' active':''}"
      style="${isAct ? `background:${s.color};` : ''}"
      onclick="activateTab(${i})">
      <span class="tab-icon">${iconHtml}</span>
      <span class="tab-name">${esc(s.name)}</span>
      ${s.pinned
        ? `<span class="tab-pin">📌</span>`
        : `<span class="tab-close" onclick="closeTab(${i},event)">✕</span>`}
    </div>`;
  }).join('');
}

/* ============================================================
   ADMIN — OPEN / CLOSE / AUTH
   ============================================================ */
function openAdmin() {
  adminAuth = false;
  document.getElementById('pw-screen').style.display = 'flex';
  document.getElementById('admin-panel').classList.remove('open');
  document.getElementById('pw-input').value = '';
  document.getElementById('pw-error').textContent = '';
  document.getElementById('admin-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('pw-input').focus(), 80);
}

function closeAdmin() {
  document.getElementById('admin-overlay').classList.remove('open');
  adminAuth = false;
}

function checkPw() {
  const v = document.getElementById('pw-input').value;
  if (v === cfg.password) {
    adminAuth = true;
    document.getElementById('pw-screen').style.display = 'none';
    document.getElementById('admin-panel').classList.add('open');
    renderAdmContent();
  } else {
    document.getElementById('pw-error').textContent = '❌ סיסמה שגויה, נסה שוב';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}

/* ============================================================
   ADMIN — TAB ROUTING
   ============================================================ */
function switchTab(el, tab) {
  curAdmTab = tab;
  document.querySelectorAll('.adm-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  renderAdmContent();
}

function renderAdmContent() {
  const c = document.getElementById('adm-content');
  if (curAdmTab === 'apps')     renderAppsTab(c);
  if (curAdmTab === 'settings') renderSettingsTab(c);
  if (curAdmTab === 'security') renderSecurityTab(c);
}

/* ============================================================
   ADMIN — APPS TAB
   ============================================================ */
function renderAppsTab(c) {
  const pinned = cfg.slots.filter(s=>s.pinned).length;
  c.innerHTML = `
    <p class="adm-section-title" style="margin-bottom:6px;">📱 אפליקציות ואתרים — 20 חריצים</p>
    <p style="font-size:12px;color:var(--adm-muted);margin-bottom:18px;">
      אפליקציות מוצמדות (📌) לא ניתן לסגור בממשק הרגיל ואינן מפונות כאשר מגיעים למגבלת פתיחה. עד 5 אפליקציות מוצמדות.
    </p>
    <div id="slots-wrap">
      ${cfg.slots.map((s,i) => slotHTML(s,i,pinned)).join('')}
    </div>
    <div style="margin-top:18px;display:flex;justify-content:center;">
      <button class="adm-btn" onclick="saveSlots()">💾 שמור את כל האפליקציות</button>
    </div>
  `;
}

function slotHTML(s, i, totalPinned) {
  const pinDisabled = !s.pinned && totalPinned >= 5;
  return `<div class="slot-card" id="sc${i}">
    <div class="slot-header">
      <div class="slot-num">${i+1}</div>
      <div class="slot-name-preview">${s.name || '(ריק)'}</div>
    </div>

    <div class="color-row">
      ${COLORS.map(c=>`<div class="cdot${s.color===c?' sel':''}" style="background:${c}" onclick="setColor(${i},'${c}')"></div>`).join('')}
    </div>

    <div class="field-grid-2" style="margin-bottom:8px;">
      <div>
        <div class="field-label">שם לכפתור</div>
        <input class="adm-input" id="sn${i}" value="${esc(s.name)}" placeholder="שם האפליקציה">
      </div>
      <div>
        <div class="field-label">סמל / אייקון</div>
        <div class="icon-pick-wrap">
          <div class="icon-preview-box" id="ipv${i}" onclick="document.getElementById('iimg${i}').click()" title="לחץ להעלאת תמונה">
            ${s.iconType==='image' && s.iconData
              ? `<img src="${s.iconData}" alt="">`
              : s.icon}
          </div>
          <div class="icon-pick-btns">
            <input class="adm-input" id="si${i}" value="${s.iconType==='emoji'?s.icon:''}" placeholder="🌟 אמוג'י" style="text-align:center;font-size:18px;padding:6px 8px;" oninput="previewEmoji(${i},this.value)">
            <button class="icon-pick-btn" onclick="document.getElementById('iimg${i}').click()">📷 העלה תמונה</button>
            ${s.iconType==='image'&&s.iconData?`<button class="icon-pick-btn" onclick="clearIcon(${i})" style="color:#e94560;">✕ מחק תמונה</button>`:''}
          </div>
        </div>
        <input type="file" id="iimg${i}" accept="image/*" style="display:none" onchange="loadIconImg(${i},this)">
      </div>
    </div>

    <div class="src-toggle">
      <button class="src-btn${s.srcType==='url'?' active':''}" id="sbu${i}" onclick="setSrc(${i},'url')">🌐 כתובת אינטרנט</button>
      <button class="src-btn${s.srcType==='file'?' active':''}" id="sbf${i}" onclick="setSrc(${i},'file')">📁 קובץ HTML מקומי</button>
    </div>

    <div id="surl${i}" style="${s.srcType==='url'?'':'display:none'}">
      <input class="adm-input" id="su${i}" value="${esc(s.url||'')}" placeholder="https://example.com או http://...">
    </div>

    <div id="sfil${i}" style="${s.srcType==='file'?'':'display:none'}">
      <div class="file-drop${s.fileData?' loaded':''}" onclick="document.getElementById('fi${i}').click()">
        ${s.fileData ? '✅ קובץ נטען — לחץ להחלפה' : '📂 לחץ לבחירת קובץ HTML מהמכשיר'}
      </div>
      <input type="file" id="fi${i}" accept=".html,.htm" style="display:none" onchange="loadFile(${i},this)">
    </div>

    <div class="slot-opts">
      <label class="toggle-wrap">
        <div class="toggle">
          <input type="checkbox" id="se${i}" ${s.enabled?'checked':''}>
          <span class="toggle-knob"></span>
        </div>
        פעיל
      </label>

      <label class="toggle-wrap" ${pinDisabled?'style="opacity:0.35;pointer-events:none"':''}>
        <div class="toggle">
          <input type="checkbox" id="sp${i}" ${s.pinned?'checked':''} ${pinDisabled?'disabled':''}>
          <span class="toggle-knob"></span>
        </div>
        📌 נעול
      </label>

      <button class="adm-btn ghost" style="font-size:12px;padding:7px 12px;" onclick="clearSlot(${i})">🗑️ נקה</button>
    </div>
  </div>`;
}

function setColor(i, c) {
  cfg.slots[i].color = c;
  document.querySelectorAll(`#sc${i} .cdot`).forEach(d => {
    d.classList.toggle('sel', d.style.background === c || d.style.backgroundColor === c);
  });
}

function setSrc(i, type) {
  cfg.slots[i].srcType = type;
  document.getElementById(`sbu${i}`).className = 'src-btn' + (type==='url'?' active':'');
  document.getElementById(`sbf${i}`).className = 'src-btn' + (type==='file'?' active':'');
  document.getElementById(`surl${i}`).style.display = type==='url' ? '' : 'none';
  document.getElementById(`sfil${i}`).style.display = type==='file' ? '' : 'none';
}

function loadFile(i, inp) {
  const file = inp.files[0];
  if (!file) return;
  if (file.size > 4.5 * 1024 * 1024) {
    alert('הקובץ גדול מדי (מעל 4.5MB). נא להשתמש בקובץ קטן יותר.');
    return;
  }
  const r = new FileReader();
  r.onload = e => {
    cfg.slots[i].fileData = e.target.result;
    const drop = document.querySelector(`#sfil${i} .file-drop`);
    if (drop) { drop.className = 'file-drop loaded'; drop.textContent = `✅ ${file.name} — לחץ להחלפה`; }
    const ni = document.getElementById(`sn${i}`);
    if (ni && !ni.value) ni.value = file.name.replace(/\.(html?)$/i, '');
  };
  r.readAsDataURL(file);
}

function loadIconImg(i, inp) {
  const file = inp.files[0];
  if (!file) return;
  const r = new FileReader();
  r.onload = e => {
    cfg.slots[i].iconData = e.target.result;
    cfg.slots[i].iconType = 'image';
    // Update preview box
    const pvx = document.getElementById(`ipv${i}`);
    if (pvx) pvx.innerHTML = `<img src="${e.target.result}" alt="">`;
    // Clear emoji input
    const emojiInp = document.getElementById(`si${i}`);
    if (emojiInp) emojiInp.value = '';
    // Add clear button if not present
    const wrap = pvx?.parentElement?.querySelector('.icon-pick-btns');
    if (wrap && !wrap.querySelector('.clr-icon-btn')) {
      const clrBtn = document.createElement('button');
      clrBtn.className = 'icon-pick-btn clr-icon-btn';
      clrBtn.style.color = '#e94560';
      clrBtn.textContent = '✕ מחק תמונה';
      clrBtn.onclick = () => clearIcon(i);
      wrap.appendChild(clrBtn);
    }
  };
  r.readAsDataURL(file);
}

function previewEmoji(i, val) {
  if (!val) return;
  cfg.slots[i].iconType = 'emoji';
  cfg.slots[i].iconData = null;
  cfg.slots[i].icon = val;
  const pvx = document.getElementById(`ipv${i}`);
  if (pvx) pvx.innerHTML = val;
}

function clearIcon(i) {
  cfg.slots[i].iconData = null;
  cfg.slots[i].iconType = 'emoji';
  cfg.slots[i].icon = ICONS[i];
  const pvx = document.getElementById(`ipv${i}`);
  if (pvx) pvx.innerHTML = ICONS[i];
  const emojiInp = document.getElementById(`si${i}`);
  if (emojiInp) emojiInp.value = ICONS[i];
  document.querySelector(`#sc${i} .clr-icon-btn`)?.remove();
}

function clearSlot(i) {
  if (!confirm(`לנקות את חריץ ${i+1}?`)) return;
  cfg.slots[i] = makeDefaultSlot(i);
  // Remove iframe if open
  if (openTabs.includes(i)) closeTab(i, null);
  renderAdmContent();
}

function saveSlots() {
  cfg.slots.forEach((s, i) => {
    s.name    = (document.getElementById(`sn${i}`)?.value || '').trim();
    s.url     = (document.getElementById(`su${i}`)?.value || '').trim();
    s.enabled = !!document.getElementById(`se${i}`)?.checked;
    s.pinned  = !!document.getElementById(`sp${i}`)?.checked;
    // Icon: if image was loaded it's already in cfg.slots[i].iconData
    // Only update emoji if iconType is still 'emoji'
    if (s.iconType !== 'image') {
      const emojiVal = (document.getElementById(`si${i}`)?.value || '').trim();
      s.icon = emojiVal || ICONS[i];
      s.iconType = 'emoji';
    }
    if (!s.name) s.enabled = false;
  });
  saveCfg();
  renderHome();
  renderTabBar();
  renderAdmContent();
  showToast('✅ האפליקציות נשמרו בהצלחה!');
}

/* ============================================================
   ADMIN — SETTINGS TAB
   ============================================================ */
function renderSettingsTab(c) {
  c.innerHTML = `
    <p class="adm-section-title">⚙️ הגדרות כלליות</p>

    <div class="adm-row">
      <div>
        <div class="adm-row-label">שם האפליקציה</div>
        <div class="adm-row-desc">מוצג בכותרת</div>
      </div>
      <input class="adm-input" id="s-appname" value="${esc(cfg.appName)}" style="max-width:180px;text-align:center;">
    </div>

    <div class="adm-row">
      <div>
        <div class="adm-row-label">אפליקציות פתוחות בו-זמנית</div>
        <div class="adm-row-desc">מ-1 עד 5. אפליקציות נעולות אינן נסגרות בכפייה.</div>
      </div>
      <div class="num-ctrl">
        <button class="num-btn" onclick="chMax(-1)">−</button>
        <div class="num-val" id="s-maxval">${cfg.maxOpen}</div>
        <button class="num-btn" onclick="chMax(1)">+</button>
      </div>
    </div>

    <div class="adm-row">
      <div>
        <div class="adm-row-label">🔒 מצב קיוסק</div>
        <div class="adm-row-desc">מסתיר את כפתור הניהול. כניסה: 5 לחיצות על שם האפליקציה.</div>
      </div>
      <label class="toggle-wrap">
        <div class="toggle">
          <input type="checkbox" id="s-kiosk" ${cfg.kioskMode?'checked':''} onchange="previewKiosk(this.checked)">
          <span class="toggle-knob"></span>
        </div>
      </label>
    </div>

    <div style="margin-top:22px;display:flex;gap:10px;flex-wrap:wrap;">
      <button class="adm-btn" onclick="saveSettings()">💾 שמור הגדרות</button>
    </div>

    <div style="margin-top:36px;padding-top:20px;border-top:1px solid var(--adm-border);">
      <p class="adm-section-title">⚠️ איפוס</p>
      <button class="adm-btn danger" onclick="resetAll()">🗑️ איפוס מלא — מחיקת כל ההגדרות</button>
    </div>
  `;
}

function chMax(d) {
  cfg.maxOpen = Math.max(1, Math.min(5, cfg.maxOpen + d));
  const el = document.getElementById('s-maxval');
  if (el) el.textContent = cfg.maxOpen;
}

function previewKiosk(v) { cfg.kioskMode = v; applyKiosk(); }

function saveSettings() {
  cfg.appName = (document.getElementById('s-appname')?.value || 'KidsZone ⭐').trim();
  cfg.kioskMode = !!document.getElementById('s-kiosk')?.checked;
  saveCfg();
  applyKiosk();
  document.getElementById('app-logo').textContent = cfg.appName;
  document.title = cfg.appName.replace(/[⭐🌟]/g,'').trim() || 'KidsZone';
  showToast('✅ ההגדרות נשמרו!');
}

function resetAll() {
  if (!confirm('לאפס את כל ההגדרות? פעולה זו תמחק את כל ההגדרות לצמיתות.')) return;
  localStorage.removeItem('kz_v2');
  cfg = defaultCfg();
  saveCfg();
  openTabs = []; activeIdx = null;
  document.getElementById('iframe-container').innerHTML = '';
  showHomeScreen();
  renderHome();
  applyKiosk();
  renderAdmContent();
  showToast('🔄 האפליקציה אופסה לברירות מחדל');
}

/* ============================================================
   ADMIN — SECURITY TAB
   ============================================================ */
function renderSecurityTab(c) {
  c.innerHTML = `
    <p class="adm-section-title">🔑 שינוי סיסמת מנהל</p>
    <div class="pw-fields">
      <div>
        <div class="field-label">סיסמה נוכחית</div>
        <input class="adm-input" type="password" id="pw-cur" autocomplete="new-password" placeholder="הסיסמה הנוכחית">
      </div>
      <div>
        <div class="field-label">סיסמה חדשה (4 תווים לפחות)</div>
        <input class="adm-input" type="password" id="pw-new" autocomplete="new-password" placeholder="הסיסמה החדשה">
      </div>
      <div>
        <div class="field-label">אישור סיסמה חדשה</div>
        <input class="adm-input" type="password" id="pw-conf" autocomplete="new-password" placeholder="חזור על הסיסמה החדשה">
      </div>
      <div class="pw-msg" id="pw-chg-msg"></div>
      <button class="adm-btn" onclick="changePw()">🔑 שנה סיסמה</button>
    </div>

    <div style="margin-top:36px;padding-top:20px;border-top:1px solid var(--adm-border);">
      <p class="adm-section-title">ℹ️ גישה בקיוסק</p>
      <p style="font-size:13px;color:var(--adm-muted);line-height:1.8;">
        כאשר מצב קיוסק מופעל, כפתור הניהול מוסתר.<br>
        <strong style="color:var(--adm-text);">כדי לפתוח ניהול:</strong> לחץ על שם האפליקציה <strong style="color:var(--adm-accent);">5 פעמים ברצף</strong> תוך שתי שניות.
      </p>
    </div>
  `;
}

function changePw() {
  const cur  = document.getElementById('pw-cur').value;
  const nw   = document.getElementById('pw-new').value;
  const conf = document.getElementById('pw-conf').value;
  const msg  = document.getElementById('pw-chg-msg');
  msg.style.color = 'var(--adm-accent)';
  if (cur !== cfg.password)  { msg.textContent = '❌ הסיסמה הנוכחית שגויה'; return; }
  if (nw.length < 4)         { msg.textContent = '❌ הסיסמה החדשה קצרה (לפחות 4 תווים)'; return; }
  if (nw !== conf)            { msg.textContent = '❌ הסיסמאות החדשות אינן תואמות'; return; }
  cfg.password = nw;
  saveCfg();
  msg.style.color = '#1dd1a1';
  msg.textContent = '✅ הסיסמה שונתה בהצלחה!';
  document.getElementById('pw-cur').value  = '';
  document.getElementById('pw-new').value  = '';
  document.getElementById('pw-conf').value = '';
  setTimeout(()=>{ msg.textContent=''; }, 3500);
}

/* ============================================================
   KIOSK MODE
   ============================================================ */
function applyKiosk() {
  const banner = document.getElementById('kiosk-banner');
  const admBtn = document.getElementById('admin-btn');
  if (cfg.kioskMode) {
    banner.style.display = 'block';
    document.body.classList.add('kiosk-on');
    admBtn.style.opacity = '0';
    admBtn.style.pointerEvents = 'none';
    try { if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen(); }
    catch(e){}
  } else {
    banner.style.display = 'none';
    document.body.classList.remove('kiosk-on');
    admBtn.style.opacity = '0.4';
    admBtn.style.pointerEvents = '';
    try { if (document.exitFullscreen && document.fullscreenElement) document.exitFullscreen(); }
    catch(e){}
  }
}

// 5-tap on logo to open admin in kiosk mode
document.getElementById('app-logo').addEventListener('click', () => {
  logoTaps++;
  clearTimeout(logoTimer);
  logoTimer = setTimeout(() => { logoTaps = 0; }, 2000);
  if (logoTaps >= 5) { logoTaps = 0; openAdmin(); }
});

// Block back navigation in kiosk
window.addEventListener('popstate', () => {
  if (cfg.kioskMode) history.pushState(null, null, location.href);
});

/* ============================================================
   UI EVENTS
   ============================================================ */
document.getElementById('home-btn').onclick = () => { showHomeScreen(); renderHome(); };
document.getElementById('admin-btn').onclick = openAdmin;
document.getElementById('pw-input').addEventListener('keydown', e => { if (e.key==='Enter') checkPw(); });
document.getElementById('admin-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('admin-overlay')) closeAdmin();
});

/* ============================================================
   UTILS
   ============================================================ */
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

/* ============================================================
   INIT
   ============================================================ */
(function init() {
  document.getElementById('app-logo').textContent = cfg.appName;
  document.title = cfg.appName.replace(/[⭐🌟]/g,'').trim() || 'KidsZone';
  renderHome();
  renderTabBar();
  applyKiosk();
  history.pushState(null, null, location.href);
})();
</script>
</body>
</html>
